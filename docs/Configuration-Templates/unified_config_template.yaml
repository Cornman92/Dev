# =============================================================================
# SYSTEM PREFERENCES
# =============================================================================
preferences:
  # Interface preferences
  interface:
    default_mode: "tui"  # tui, gui, or auto
    theme: "dark"        # dark, light, gaming, minimal
    font_size: "medium"  # small, medium, large
    animations: true
    sound_effects: true
  
  # Performance preferences
  performance:
    auto_optimization: true
    aggressive_mode: false
    power_profile: "balanced"  # power_save, balanced, performance, gaming
    thermal_throttling: 85
  
  # Notification preferences
  notifications:
    enabled: true
    sound: true
    desktop: true
    system_tray: true
    email: false
  
  # Backup preferences
  backup:
    auto_backup: true
    backup_interval: "daily"  # daily, weekly, monthly
    retention_days: 30
    cloud_sync: true

# =============================================================================
# GAMING CONFIGURATION
# =============================================================================
gaming:
  # General gaming settings
  general:
    auto_detection: true
    auto_optimization: true
    game_overlay: true
    performance_monitoring: true
    ai_coach_enabled: true
  
  # Optimization profiles
  optimization_profiles:
    competitive:
      target_fps: 144
      quality_preset: "performance"
      ray_tracing: false
      dlss: "performance"
      vsync: false
      gsync: true
    
    balanced:
      target_fps: 90
      quality_preset: "high"
      ray_tracing: true
      dlss: "balanced"
      vsync: false
      gsync: true
    
    visual_quality:
      target_fps: 60
      quality_preset: "ultra"
      ray_tracing: true
      dlss: "quality"
      vsync: true
      gsync: true
  
  # Game-specific configurations
  game_profiles:
    "Cyberpunk 2077":
      optimization_level: "balanced"
      ray_tracing: true
      dlss: "balanced"
      target_fps: 60
      custom_settings:
        crowd_density: "high"
        volumetric_fog: "medium"
        screen_space_reflections: "high"
    
    "Valorant":
      optimization_level: "competitive"
      ray_tracing: false
      dlss: false
      target_fps: 300
      custom_settings:
        multithreaded_rendering: true
        material_quality: "low"
        texture_quality: "medium"
    
    "Apex Legends":
      optimization_level: "competitive"
      ray_tracing: false
      dlss: "performance"
      target_fps: 144
      custom_settings:
        adaptive_resolution: true
        texture_streaming_budget: 4
    
    "Elden Ring":
      optimization_level: "balanced"
      ray_tracing: true
      dlss: "quality"
      target_fps: 60
      custom_settings:
        shadow_quality: "high"
        grass_quality: "medium"
  
  # Streaming configuration
  streaming:
    enabled: true
    platform: "twitch"  # twitch, youtube, facebook, mixer
    quality: "high"      # low, medium, high, ultra
    bitrate: 6000
    resolution: "1920x1080"
    fps: 60
    encoder: "nvenc"     # nvenc, x264, x265
    obs_integration: true
  
  # RGB control
  rgb_control:
    enabled: true
    sync_with_games: true
    providers:
      corsair_icue: true
      razer_chroma: false
      asus_aura: false
    game_profiles: true

# =============================================================================
# SYSTEM PERFORMANCE CONFIGURATION
# =============================================================================
system_performance:
  # Monitoring settings
  monitoring:
    enabled: true
    interval: 1          # seconds
    overlay_enabled: true
    overlay_position: "top-right"  # top-left, top-right, bottom-left, bottom-right
    metrics:
      - "fps"
      - "cpu_usage"
      - "gpu_usage"
      - "memory_usage"
      - "temperature"
      - "power_consumption"
  
  # Optimization settings
  optimization:
    auto_optimize: true
    optimization_level: "balanced"  # conservative, balanced, aggressive
    cpu_priority: "normal"          # low, normal, high, realtime
    gpu_priority: "high"
    memory_optimization: true
    storage_optimization: true
    network_optimization: true
  
  # Thermal management
  thermal:
    monitoring: true
    cpu_throttle_temp: 85
    gpu_throttle_temp: 83
    fan_curve: "aggressive"  # quiet, balanced, aggressive, custom
    auto_fan_control: true
  
  # Power management
  power:
    cpu_power_limit: 95      # percentage
    gpu_power_limit: 100     # percentage
    memory_power_limit: 100  # percentage
    auto_power_management: true

# =============================================================================
# AUTOMATION CONFIGURATION
# =============================================================================
automation:
  # General automation settings
  general:
    enabled: true
    smart_automation: true
    self_improvement: true
    learning_enabled: true
  
  # Scheduled tasks
  scheduled_tasks:
    system_cleanup:
      enabled: true
      schedule: "daily"
      time: "02:00"
      tasks:
        - "temp_file_cleanup"
        - "registry_cleanup"
        - "browser_cache_cleanup"
        - "log_rotation"
    
    system_optimization:
      enabled: true
      schedule: "weekly"
      day: "sunday"
      time: "03:00"
      tasks:
        - "defragmentation"
        - "memory_optimization"
        - "driver_updates"
        - "performance_tuning"
    
    backup:
      enabled: true
      schedule: "daily"
      time: "04:00"
      tasks:
        - "system_backup"
        - "user_data_backup"
        - "configuration_backup"
  
  # Event-driven automation
  event_automation:
    game_launched:
      enabled: true
      actions:
        - "optimize_for_gaming"
        - "start_performance_monitoring"
        - "enable_gaming_overlay"
        - "activate_ai_coach"
    
    high_cpu_usage:
      enabled: true
      threshold: 90
      actions:
        - "reduce_background_processes"
        - "optimize_memory_usage"
        - "adjust_fan_curve"
    
    low_disk_space:
      enabled: true
      threshold: 10  # GB
      actions:
        - "run_cleanup"
        - "compress_old_files"
        - "notify_user"

