# =============================================================================
cloud_integration:
  # General cloud settings
  general:
    enabled: true
    auto_sync: true
    sync_interval: 300  # seconds
    bandwidth_limit: 0  # 0 = unlimited
  
  # Cloud providers
  providers:
    onedrive:
      enabled: true
      sync_folder: "GaymerPC_Data"
      auto_backup: true
      encryption: true
    
    google_drive:
      enabled: false
      sync_folder: "GaymerPC_Data"
      auto_backup: false
      encryption: true
    
    dropbox:
      enabled: false
      sync_folder: "GaymerPC_Data"
      auto_backup: false
      encryption: true
  
  # Backup settings
  backup:
    enabled: true
    schedule: "daily"
    time: "02:00"
    retention_days: 30
    compression: true
    encryption: true
    include_games: false
    include_media: false

