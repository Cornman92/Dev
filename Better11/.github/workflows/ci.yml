name: Better11 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build and Test (MSBuild/x64)
        shell: pwsh
        run: .\scripts\Build-Better11.ps1 -Configuration Release -Test

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $paths = @('./PowerShell', './modules'); $settings = './config/PSScriptAnalyzerSettings.psd1'
          if (-not (Test-Path $settings)) { $settings = $null }
          foreach ($p in $paths) {
            if (Test-Path $p) {
              $results = Invoke-ScriptAnalyzer -Path $p -Recurse -Settings $settings -ErrorAction SilentlyContinue
              if ($results) { $results | Format-Table; exit 1 }
            }
          }

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.5.0

      - name: Run Pester
        shell: pwsh
        run: |
          $modulePaths = @('./PowerShell/Modules', './modules')
          foreach ($mp in $modulePaths) {
            if (Test-Path $mp) {
              $config = New-PesterConfiguration
              $config.Run.Path = $mp
              $config.Run.Passthru = $true
              $result = Invoke-Pester -Configuration $config
              if ($result.FailedCount -gt 0) { exit 1 }
            }
          }

  package:
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Create MSIX package
        shell: pwsh
        run: .\scripts\Build-Better11.ps1 -Configuration Release -Package
      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: Better11-msix
          path: artifacts/*.msix
