# GaymerPC Ultimate Suite - Continuous Integration
# Optimized for Connor O (C-Man) - i5-9600K + RTX 3060 Ti Gaming PC

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/*, hotfix/* ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM

env:
  GAYMERPC_VERSION: 1.0.0
  GAYMERPC_USER: "Connor O (C-Man)"
  GAYMERPC_HARDWARE: "i5-9600K + RTX 3060 Ti + 32GB DDR4"
  PYTHON_VERSION: 3.11
  NODE_VERSION: 18
  DOCKER_BUILDKIT: 1

jobs:
  # =============================================================================
  # CODE QUALITY CHECKS
  # =============================================================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black isort flake8 mypy bandit safety pytest pytest-cov
      
      - name: Install Node.js Dependencies
        run: npm ci
      
      - name: Python Code Formatting Check
        run: |
          echo "Checking Python code formatting with black..."
          black --check --diff GaymerPC/
          echo "Checking Python import sorting with isort..."
          isort --check-only --diff GaymerPC/
      
      - name: Python Linting
        run: |
          echo "Running flake8 linter..."
          flake8 GaymerPC/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 GaymerPC/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Python Type Checking
        run: |
          echo "Running mypy type checker..."
          mypy GaymerPC/ --ignore-missing-imports --no-strict-optional
      
      - name: Python Security Check
        run: |
          echo "Running bandit security checker..."
          bandit -r GaymerPC/ -f json -o bandit-report.json || true
          bandit -r GaymerPC/ -f txt
      
      - name: Dependency Security Check
        run: |
          echo "Checking for known security vulnerabilities..."
          safety check --json --output safety-report.json || true
          safety check
      
      - name: Node.js Linting
        run: |
          echo "Running ESLint..."
          npm run lint || true
      
      - name: Upload Security Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  # =============================================================================
  # UNIT TESTS
  # =============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache Python Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-xdist pytest-mock
      
      - name: Run Unit Tests
        run: |
          pytest GaymerPC/Tests/ \
            --cov=GaymerPC \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --junitxml=pytest-report.xml \
            --maxfail=5 \
            -v
      
      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            pytest-report.xml
            coverage.xml
            htmlcov/
          retention-days: 30

  # =============================================================================
  # INTEGRATION TESTS
  # =============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gaymerpc_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run Integration Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gaymerpc_test
          REDIS_URL: redis://localhost:6379
          GAYMERPC_TEST_MODE: true
        run: |
          pytest GaymerPC/Tests/Integration/ \
            --cov=GaymerPC \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=integration-test-report.xml \
            --maxfail=3 \
            -v
      
      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: |
            integration-test-report.xml
            coverage.xml
            htmlcov/
          retention-days: 30

  # =============================================================================
  # DOCKER BUILD AND TEST
  # =============================================================================
  docker-build:
    name: Docker Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Test Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: testing
          push: false
          tags: |
            gaymerpc-suite:test-${{ github.sha }}
            gaymerpc-suite:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GAYMERPC_VERSION=${{ env.GAYMERPC_VERSION }}
            GAYMERPC_USER=${{ env.GAYMERPC_USER }}
            GAYMERPC_HARDWARE=${{ env.GAYMERPC_HARDWARE }}
      
      - name: Run Docker Tests
        run: |
          docker run --rm \
            -e GAYMERPC_TEST_MODE=true \
            -e GAYMERPC_LOG_LEVEL=WARNING \
            gaymerpc-suite:test-${{ github.sha }} \
            python -m pytest GaymerPC/Tests/ --cov=GaymerPC --cov-report=xml
      
      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            gaymerpc-suite:${{ env.GAYMERPC_VERSION }}
            gaymerpc-suite:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GAYMERPC_VERSION=${{ env.GAYMERPC_VERSION }}
            GAYMERPC_USER=${{ env.GAYMERPC_USER }}
            GAYMERPC_HARDWARE=${{ env.GAYMERPC_HARDWARE }}

  # =============================================================================
  # PERFORMANCE TESTS
  # =============================================================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark memory-profiler
      
      - name: Run Performance Tests
        run: |
          pytest GaymerPC/Tests/Performance/ \
            --benchmark-only \
            --benchmark-save=performance-baseline \
            --benchmark-save-data \
            --benchmark-compare-fail=mean:10% \
            --junitxml=performance-test-report.xml \
            -v
      
      - name: Upload Performance Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-test-results
          path: |
            performance-test-report.xml
            .benchmarks/
          retention-days: 30

  # =============================================================================
  # SECURITY SCAN
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: python

  # =============================================================================
  # DEPLOYMENT TESTS
  # =============================================================================
  deployment-test:
    name: Deployment Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Docker Compose
        run: |
          echo "Testing Docker Compose deployment..."
          docker-compose -f docker-compose.yml config
          docker-compose -f docker-compose.yml build --parallel
          docker-compose -f docker-compose.yml up -d
          sleep 30
          docker-compose -f docker-compose.yml ps
          docker-compose -f docker-compose.yml logs --tail=100
          docker-compose -f docker-compose.yml down -v
      
      - name: Test PowerShell Scripts
        run: |
          echo "Testing PowerShell scripts..."
          pwsh -Command "Get-ChildItem -Path . -Filter '*.ps1' -Recurse | ForEach-Object { Write-Host \"Testing: $($_.FullName)\"; pwsh -Command \"& { try { . '$($_.FullName)' -WhatIf } catch { Write-Warning \"Error in $($_.FullName): $($_.Exception.Message)\" } }\" }"

  # =============================================================================
  # DOCUMENTATION BUILD
  # =============================================================================
  documentation:
    name: Documentation Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Documentation Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme mkdocs mkdocs-material
      
      - name: Build Documentation
        run: |
          echo "Building Sphinx documentation..."
          cd GaymerPC/Docs && make html
          
          echo "Building MkDocs documentation..."
          mkdocs build
      
      - name: Upload Documentation
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: |
            GaymerPC/Docs/_build/html/
            site/
          retention-days: 30

  # =============================================================================
  # NOTIFICATION
  # =============================================================================
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, integration-tests, docker-build, performance-tests, security-scan, deployment-test, documentation]
    if: always()
    
    steps:
      - name: Notify Success
        if: ${{ needs.code-quality.result == 'success' && needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success' && needs.docker-build.result == 'success' }}
        run: |
          echo "✅ All CI/CD checks passed successfully!"
          echo "🎮 GaymerPC Ultimate Suite is ready for deployment!"
      
      - name: Notify Failure
        if: ${{ needs.code-quality.result == 'failure' || needs.unit-tests.result == 'failure' || needs.integration-tests.result == 'failure' || needs.docker-build.result == 'failure' }}
        run: |
          echo "❌ CI/CD checks failed!"
          echo "🔍 Please check the failed jobs and fix the issues."
          exit 1
