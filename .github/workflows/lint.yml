name: PowerShell Lint

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.ps1'
      - '**.psm1'
      - '**.psd1'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.ps1'
      - '**.psm1'
      - '**.psd1'

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -ExcludeRule PSAvoidUsingWriteHost

          if ($results) {
            $results | Format-Table -AutoSize
            $errors = $results | Where-Object { $_.Severity -eq 'Error' }
            if ($errors) {
              Write-Error "PSScriptAnalyzer found $($errors.Count) error(s)."
              exit 1
            }
            Write-Warning "PSScriptAnalyzer found $($results.Count) issue(s) (no errors)."
          } else {
            Write-Host "PSScriptAnalyzer: No issues found." -ForegroundColor Green
          }
