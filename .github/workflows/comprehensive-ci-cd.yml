# GaymerPC Ultimate Suite - Comprehensive CI/CD Pipeline
# Advanced automation for Connor O (C-Man) - i5-9600K + RTX 3060 Ti Gaming PC
# Windows 11 Pro x64 24H2 Development Environment

name: 🚀 Comprehensive CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/*, hotfix/* ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]
  release:
    types: [ published, created ]
  schedule:
    # Security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
    # Performance tests weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      skip_tests:
        description: 'Skip tests'
        required: false
        type: boolean
        default: false
      force_deploy:
        description: 'Force deployment'
        required: false
        type: boolean
        default: false
      run_performance_tests:
        description: 'Run performance tests'
        required: false
        type: boolean
        default: false

env:
  # Core Environment
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  POWERSHELL_VERSION: '7.4'
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  
  # Project Configuration
  PROJECT_NAME: 'gaymerpc-ultimate-suite'
  VERSION: '1.0.0'
  USER: 'Connor O (C-Man)'
  HARDWARE: 'i5-9600K + RTX 3060 Ti + 32GB DDR4'
  
  # Quality Gates
  COVERAGE_THRESHOLD: 85
  PERFORMANCE_THRESHOLD: 90
  SECURITY_THRESHOLD: 95
  
  # Registry and Deployment
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# =============================================================================
# JOBS
# =============================================================================

jobs:
  # =============================================================================
  # PREPARATION & VALIDATION
  # =============================================================================
  
  prepare:
    name: 🔧 Preparation & Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      has-changes: ${{ steps.changes.outputs.has-changes }}
      python-changes: ${{ steps.changes.outputs.python-changes }}
      node-changes: ${{ steps.changes.outputs.node-changes }}
      powershell-changes: ${{ steps.changes.outputs.powershell-changes }}
      docker-changes: ${{ steps.changes.outputs.docker-changes }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Generate version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "version=${{ env.VERSION }}-main-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "version=${{ env.VERSION }}-dev-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          else
            echo "version=${{ env.VERSION }}-$(echo ${{ github.ref_name }} | tr '/' '-')-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Detect changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Get changed files in PR
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          else
            # Get changed files in push
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          
          echo "has-changes=true" >> $GITHUB_OUTPUT
          echo "python-changes=false" >> $GITHUB_OUTPUT
          echo "node-changes=false" >> $GITHUB_OUTPUT
          echo "powershell-changes=false" >> $GITHUB_OUTPUT
          echo "docker-changes=false" >> $GITHUB_OUTPUT
          
          if echo "$CHANGED_FILES" | grep -E '\.(py|pyi)$|requirements.*\.txt|pyproject\.toml|setup\.py'; then
            echo "python-changes=true" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -E '\.(js|ts|jsx|tsx|json)$|package\.json|package-lock\.json|yarn\.lock|pnpm-lock\.yaml'; then
            echo "node-changes=true" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -E '\.(ps1|psm1|psd1)$'; then
            echo "powershell-changes=true" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -E 'Dockerfile|docker-compose\.yml|\.dockerignore'; then
            echo "docker-changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 📋 Display changes
        run: |
          echo "🔍 Detected changes:"
          echo "  Python: ${{ steps.changes.outputs.python-changes }}"
          echo "  Node.js: ${{ steps.changes.outputs.node-changes }}"
          echo "  PowerShell: ${{ steps.changes.outputs.powershell-changes }}"
          echo "  Docker: ${{ steps.changes.outputs.docker-changes }}"
          echo "  Version: ${{ steps.version.outputs.version }}"

  # =============================================================================
  # CODE QUALITY & SECURITY
  # =============================================================================
  
  quality-security:
    name: 🛡️ Quality & Security Analysis
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has-changes == 'true'
    strategy:
      matrix:
        include:
          - language: python
            condition: ${{ needs.prepare.outputs.python-changes == 'true' }}
          - language: node
            condition: ${{ needs.prepare.outputs.node-changes == 'true' }}
          - language: powershell
            condition: ${{ needs.prepare.outputs.powershell-changes == 'true' }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        if: matrix.language == 'python' && matrix.condition
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Setup Node.js
        if: matrix.language == 'node' && matrix.condition
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install Python dependencies
        if: matrix.language == 'python' && matrix.condition
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pre-commit

      - name: 📦 Install Node.js dependencies
        if: matrix.language == 'node' && matrix.condition
        run: |
          npm ci
          npm install -g @typescript-eslint/parser @typescript-eslint/eslint-plugin

      - name: 🔍 Python Code Quality
        if: matrix.language == 'python' && matrix.condition
        run: |
          echo "🔍 Running Python code quality checks..."
          
          # Linting
          flake8 GaymerPC/ --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check --diff GaymerPC/
          isort --check-only --diff GaymerPC/
          
          # Type checking
          mypy GaymerPC/ --ignore-missing-imports
          
          # Security scanning
          bandit -r GaymerPC/ -f json -o bandit-report.json || true
          
          # Complexity analysis
          radon cc GaymerPC/ -a -nc
          radon mi GaymerPC/ -nc

      - name: 🔍 Node.js Code Quality
        if: matrix.language == 'node' && matrix.condition
        run: |
          echo "🔍 Running Node.js code quality checks..."
          
          # Linting
          npx eslint "**/*.{js,ts,jsx,tsx}" --format json --output-file eslint-report.json || true
          
          # Type checking
          npx tsc --noEmit
          
          # Security audit
          npm audit --audit-level moderate --json > npm-audit-report.json || true

      - name: 🔍 PowerShell Code Quality
        if: matrix.language == 'powershell' && matrix.condition
        run: |
          echo "🔍 Running PowerShell code quality checks..."
          
          # Install PSScriptAnalyzer
          pwsh -Command "Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser"
          
          # Run analysis
          pwsh -Command "Get-ChildItem -Path . -Filter '*.ps1' -Recurse | ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Severity @('Error', 'Warning') }"

      - name: 📊 Upload quality reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: quality-reports-${{ matrix.language }}
          path: |
            *-report.json
            eslint-report.json
            npm-audit-report.json
            bandit-report.json

  # =============================================================================
  # TESTING
  # =============================================================================
  
  test:
    name: 🧪 Comprehensive Testing
    runs-on: ${{ matrix.os }}
    needs: prepare
    if: needs.prepare.outputs.has-changes == 'true' && inputs.skip_tests != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
        node-version: ['16', '18', '20']
        include:
          - os: windows-latest
            python-version: '3.11'
            node-version: '18'
            test-all: true
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          npm ci

      - name: 🧪 Run Python tests
        run: |
          echo "🧪 Running Python tests..."
          pytest GaymerPC/Tests/ \
            --cov=GaymerPC \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            --junitxml=pytest-report.xml \
            -v

      - name: 🧪 Run Node.js tests
        run: |
          echo "🧪 Running Node.js tests..."
          npm test -- --coverage --coverageReporters=text-lcov --coverageReporters=html

      - name: 🧪 Run integration tests
        if: matrix.test-all == 'true'
        run: |
          echo "🧪 Running integration tests..."
          pytest GaymerPC/Tests/ -m integration --junitxml=integration-report.xml

      - name: 🧪 Run performance tests
        if: matrix.test-all == 'true' && (inputs.run_performance_tests == 'true' || github.event_name == 'schedule')
        run: |
          echo "🧪 Running performance tests..."
          pytest GaymerPC/Tests/ -m performance --benchmark-only --benchmark-save=benchmark_results

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}-node${{ matrix.node-version }}
          path: |
            pytest-report.xml
            integration-report.xml
            coverage.xml
            htmlcov/
            coverage/
            benchmark_results/

  # =============================================================================
  # BUILD & PACKAGE
  # =============================================================================
  
  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    needs: [prepare, quality-security, test]
    if: always() && (needs.quality-security.result == 'success' || needs.quality-security.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped')
    strategy:
      matrix:
        target: [python, node, docker]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        if: matrix.target == 'python'
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Setup Node.js
        if: matrix.target == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🐳 Setup Docker Buildx
        if: matrix.target == 'docker'
        uses: docker/setup-buildx-action@v3

      - name: 🔧 Install Python dependencies
        if: matrix.target == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build twine

      - name: 📦 Install Node.js dependencies
        if: matrix.target == 'node'
        run: npm ci

      - name: 🏗️ Build Python package
        if: matrix.target == 'python'
        run: |
          echo "🏗️ Building Python package..."
          python -m build --wheel --sdist
          ls -la dist/

      - name: 🏗️ Build Node.js package
        if: matrix.target == 'node'
        run: |
          echo "🏗️ Building Node.js package..."
          npm run build
          npm pack

      - name: 🏗️ Build Docker image
        if: matrix.target == 'docker'
        run: |
          echo "🏗️ Building Docker image..."
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }} .
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts-${{ matrix.target }}
          path: |
            dist/
            *.tgz
            Dockerfile

  # =============================================================================
  # SECURITY SCANNING
  # =============================================================================
  
  security:
    name: 🔒 Security Scanning
    runs-on: ubuntu-latest
    needs: prepare
    if: always() && (github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'pull_request')
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 🔒 Run CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: python, javascript

      - name: 🔒 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

      - name: 📊 Upload security results
        uses: actions/upload-artifact@v3
        with:
          name: security-results
          path: trivy-results.sarif

  # =============================================================================
  # DEPLOYMENT
  # =============================================================================
  
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [prepare, build, security]
    if: always() && (needs.build.result == 'success') && (needs.security.result == 'success' || needs.security.result == 'skipped') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch')
    environment: ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'staging') || 'development' }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts-docker
          path: ./artifacts

      - name: 🐳 Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Deploy to environment
        run: |
          echo "🚀 Deploying to ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'staging') || 'development' }}"
          
          # Deploy based on environment
          case "${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'staging') || 'development' }}" in
            "production")
              echo "🚀 Production deployment"
              # Add production deployment logic
              ;;
            "staging")
              echo "🚀 Staging deployment"
              # Add staging deployment logic
              ;;
            "development")
              echo "🚀 Development deployment"
              # Add development deployment logic
              ;;
          esac

      - name: 📊 Deployment notification
        if: always()
        run: |
          echo "📊 Deployment completed with status: ${{ job.status }}"
          # Add notification logic (Slack, Discord, etc.)

  # =============================================================================
  # CLEANUP
  # =============================================================================
  
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [prepare, quality-security, test, build, security, deploy]
    if: always()
    steps:
      - name: 🧹 Cleanup old artifacts
        run: |
          echo "🧹 Cleaning up old artifacts and temporary files..."
          # Add cleanup logic

      - name: 📊 Generate pipeline report
        run: |
          echo "📊 Pipeline execution completed"
          echo "  Quality: ${{ needs.quality-security.result }}"
          echo "  Tests: ${{ needs.test.result }}"
          echo "  Build: ${{ needs.build.result }}"
          echo "  Security: ${{ needs.security.result }}"
          echo "  Deploy: ${{ needs.deploy.result }}"

