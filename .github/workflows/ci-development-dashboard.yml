name: Development Dashboard CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'active-projects/development-dashboard/**'
      - '.github/workflows/ci-development-dashboard.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'active-projects/development-dashboard/**'

env:
  NODE_VERSION: '18.x'

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: active-projects/development-dashboard/package.json

      - name: Install dependencies
        working-directory: active-projects/development-dashboard
        run: npm ci

      - name: Run linter
        working-directory: active-projects/development-dashboard
        run: npm run lint --if-present

      - name: Run tests
        working-directory: active-projects/development-dashboard
        run: npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: active-projects/development-dashboard/coverage/lcov.info
          flags: development-dashboard
          name: development-dashboard-coverage

  build:
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: active-projects/development-dashboard
        run: npm ci

      - name: Build
        working-directory: active-projects/development-dashboard
        run: npm run build --if-present

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: development-dashboard-build
          path: active-projects/development-dashboard/dist
          if-no-files-found: ignore
