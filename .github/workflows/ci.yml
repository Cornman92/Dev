# Dev workspace root CI (FEATURES-AND-AUTOMATIONS-PLAN 4.2.1)
# Runs MCP integration tests and optionally workspace report.
name: Dev Workspace CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  mcp-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install MCP server dependencies
        run: |
          $servers = @(
            'time-utils-mcp-server', 'code-analysis-mcp-server', 'powershell-mcp-server',
            'system-info-mcp-server', 'winget-mcp-server', 'dotnet-cli-mcp-server',
            'nuget-mcp-server', 'project-scaffolder-mcp-server'
          )
          foreach ($s in $servers) {
            if (Test-Path $s) {
              Push-Location $s
              npm ci 2>$null || npm install
              Pop-Location
            }
          }

      - name: Run all MCP tests
        run: npm run test:mcp-all

  workspace-report:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate workspace report
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./Generate-WorkspaceReport.ps1 -WorkspaceRoot $env:GITHUB_WORKSPACE -OutputPath ./workspace_report_generated.json
      - name: Upload workspace report
        uses: actions/upload-artifact@v4
        with:
          name: workspace-report
          path: workspace_report_generated.json

  dashboard:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install and test dev-dashboard
        run: |
          cd dev-dashboard
          npm ci 2>$null || npm install
          npm test 2>$null || echo "No test script or tests skipped"
          npm run build 2>$null || echo "No build script"
