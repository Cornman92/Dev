# .github/workflows/ci-cd.yml
# CI/CD Pipeline for Windows Power Suite v2.0

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SOLUTION_FILE: WindowsPowerSuite.sln
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64
  DOTNET_VERSION: '8.0.x'
  WINDOWS_APP_SDK_VERSION: '1.4.231008000'

jobs:
  # Build and Test Job
  build-test:
    name: Build and Test
    runs-on: windows-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Setup Windows App SDK
      run: |
        nuget install Microsoft.WindowsAppSDK -Version ${{ env.WINDOWS_APP_SDK_VERSION }}

    - name: Get Version
      id: version
      run: |
        if ("${{ github.ref }}" -match "^refs/tags/v(.+)$") {
          $version = $matches[1]
        } else {
          $version = "2.0.0.${{ github.run_number }}"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"

    - name: Restore Dependencies
      run: |
        nuget restore ${{ env.SOLUTION_FILE }}
        dotnet restore ${{ env.SOLUTION_FILE }}

    - name: Build Solution
      run: |
        msbuild ${{ env.SOLUTION_FILE }} `
          /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
          /p:Platform=${{ env.BUILD_PLATFORM }} `
          /p:Version=${{ steps.version.outputs.version }} `
          /p:AppxPackageSigningEnabled=false `
          /m

    - name: Run Unit Tests
      run: |
        dotnet test `
          --configuration ${{ env.BUILD_CONFIGURATION }} `
          --no-build `
          --verbosity normal `
          --logger "trx;LogFileName=test-results.trx" `
          --logger "html;LogFileName=test-results.html" `
          --collect:"XPlat Code Coverage" `
          --results-directory ./TestResults

    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: TestResults/

    - name: Code Coverage Report
      uses: codecov/codecov-action@v3
      with:
        files: ./TestResults/**/coverage.cobertura.xml
        flags: unittests
        name: codecov-umbrella

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: |
          src/WindowsPowerSuite.UI/bin/${{ env.BUILD_PLATFORM }}/${{ env.BUILD_CONFIGURATION }}/
          !**/*.pdb
          !**/*.xml

  # Security Scan Job
  security-scan:
    name: Security Scan
    runs-on: windows-latest
    needs: build-test
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Security Scan
      uses: github/codeql-action/analyze@v2
      with:
        languages: csharp

    - name: Dependency Check
      run: |
        dotnet list package --vulnerable --include-transitive

    - name: Run Windows Defender Scan
      run: |
        Start-MpScan -ScanType QuickScan -ScanPath .

  # Package Job - Creates MSIX and MSI installers
  package:
    name: Create Packages
    runs-on: windows-latest
    needs: [build-test, security-scan]
    if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Build Artifacts
      uses: actions/download-artifact@v3
      with:
        name: build-artifacts
        path: artifacts/

    - name: Setup Certificate
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      env:
        CERT_BASE64: ${{ secrets.CODE_SIGNING_CERT }}
        CERT_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
      run: |
        $cert = [System.Convert]::FromBase64String($env:CERT_BASE64)
        $certPath = "cert.pfx"
        [System.IO.File]::WriteAllBytes($certPath, $cert)
        
        # Import certificate for signing
        $securePassword = ConvertTo-SecureString $env:CERT_PASSWORD -AsPlainText -Force
        Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword

    - name: Create MSIX Package
      run: |
        $version = "${{ needs.build-test.outputs.version }}"
        
        # Update manifest version
        $manifest = Get-Content Setup/Package/Package.appxmanifest
        $manifest = $manifest -replace 'Version="[\d\.]+"', "Version=`"$version.0`""
        Set-Content Setup/Package/Package.appxmanifest $manifest
        
        # Create MSIX
        makeappx pack `
          /d artifacts/ `
          /p "WindowsPowerSuite_${version}_x64.msix" `
          /nv

    - name: Sign MSIX Package
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      run: |
        $version = "${{ needs.build-test.outputs.version }}"
        signtool sign `
          /fd SHA256 `
          /a `
          /f cert.pfx `
          /p ${{ secrets.CODE_SIGNING_PASSWORD }} `
          /t http://timestamp.digicert.com `
          "WindowsPowerSuite_${version}_x64.msix"

    - name: Create MSI Installer
      run: |
        $version = "${{ needs.build-test.outputs.version }}"
        
        # Build WiX installer
        & "${env:WIX}bin\candle.exe" `
          -dProductVersion=$version `
          -dExeSourcePath="artifacts" `
          -arch x64 `
          -ext WixUIExtension `
          -ext WixUtilExtension `
          -ext WixNetFxExtension `
          -out "Setup.wixobj" `
          "Setup/Installer/Product.wxs"
        
        & "${env:WIX}bin\light.exe" `
          -ext WixUIExtension `
          -ext WixUtilExtension `
          -ext WixNetFxExtension `
          -cultures:en-us `
          -loc "Setup/Installer/Product_en-us.wxl" `
          -out "WindowsPowerSuite_${version}_x64.msi" `
          "Setup.wixobj"

    - name: Sign MSI Installer
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
      run: |
        $version = "${{ needs.build-test.outputs.version }}"
        signtool sign `
          /fd SHA256 `
          /a `
          /f cert.pfx `
          /p ${{ secrets.CODE_SIGNING_PASSWORD }} `
          /t http://timestamp.digicert.com `
          "WindowsPowerSuite_${version}_x64.msi"

    - name: Create Portable ZIP
      run: |
        $version = "${{ needs.build-test.outputs.version }}"
        Compress-Archive `
          -Path artifacts/* `
          -DestinationPath "WindowsPowerSuite_${version}_x64_Portable.zip"

    - name: Upload Package Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: packages
        path: |
          *.msix
          *.msi
          *.zip

  # Release Job
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-test, package]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Packages
      uses: actions/download-artifact@v3
      with:
        name: packages
        path: packages/

    - name: Create Release Notes
      id: release_notes
      run: |
        VERSION="${{ needs.build-test.outputs.version }}"
        echo "# Windows Power Suite v${VERSION}" > notes.md
        echo "" >> notes.md
        echo "## 🎉 What's New" >> notes.md
        git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> notes.md
        echo "" >> notes.md
        echo "## 📦 Installation" >> notes.md
        echo "Choose your preferred installation method:" >> notes.md
        echo "- **MSIX Package**: For Windows 10/11 with sideloading enabled" >> notes.md
        echo "- **MSI Installer**: Traditional installer for all Windows versions" >> notes.md
        echo "- **Portable ZIP**: No installation required" >> notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref }}
        name: Windows Power Suite v${{ needs.build-test.outputs.version }}
        body_path: notes.md
        draft: false
        prerelease: ${{ contains(needs.build-test.outputs.version, 'beta') || contains(needs.build-test.outputs.version, 'alpha') }}
        files: |
          packages/*.msix
          packages/*.msi
          packages/*.zip

  # Deploy to Store Job
  deploy-store:
    name: Deploy to Microsoft Store
    runs-on: windows-latest
    needs: [build-test, package]
    if: startsWith(github.ref, 'refs/tags/') && !contains(needs.build-test.outputs.version, 'beta') && !contains(needs.build-test.outputs.version, 'alpha')
    
    steps:
    - name: Download MSIX Package
      uses: actions/download-artifact@v3
      with:
        name: packages
        path: packages/

    - name: Submit to Partner Center
      env:
        PARTNER_CENTER_TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
        PARTNER_CENTER_CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
        PARTNER_CENTER_CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
        PARTNER_CENTER_APP_ID: ${{ secrets.PARTNER_CENTER_APP_ID }}
      run: |
        # Install Store Broker module
        Install-Module -Name StoreBroker -Force -Scope CurrentUser
        
        # Authenticate
        $credential = @{
          TenantId = $env:PARTNER_CENTER_TENANT_ID
          ClientId = $env:PARTNER_CENTER_CLIENT_ID
          ClientSecret = $env:PARTNER_CENTER_CLIENT_SECRET
        }
        
        Set-StoreBrokerAuthentication @credential
        
        # Submit package
        $version = "${{ needs.build-test.outputs.version }}"
        $submission = New-ApplicationSubmission `
          -AppId $env:PARTNER_CENTER_APP_ID `
          -PackagePath "packages/WindowsPowerSuite_${version}_x64.msix" `
          -AutoCommit `
          -Force
        
        Write-Host "Submission ID: $($submission.id)"
        Write-Host "Status: $($submission.status)"

  # Documentation Job
  documentation:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Documentation
      run: |
        cd docs
        npm install
        npm run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/build

# Notification Job
notification:
  name: Send Notifications
  runs-on: ubuntu-latest
  needs: [release, deploy-store]
  if: always()
  
  steps:
  - name: Send Discord Notification
    if: always()
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    run: |
      STATUS="${{ job.status }}"
      COLOR=$([[ "$STATUS" == "success" ]] && echo "3066993" || echo "15158332")
      VERSION="${{ needs.build-test.outputs.version }}"
      
      curl -H "Content-Type: application/json" \
        -X POST \
        -d "{
          \"embeds\": [{
            \"title\": \"Windows Power Suite v${VERSION} Release\",
            \"description\": \"Build #${{ github.run_number }} - Status: ${STATUS}\",
            \"color\": ${COLOR},
            \"fields\": [
              {
                \"name\": \"Branch\",
                \"value\": \"${{ github.ref_name }}\",
                \"inline\": true
              },
              {
                \"name\": \"Commit\",
                \"value\": \"${{ github.sha }}\",
                \"inline\": true
              }
            ],
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" \
        $DISCORD_WEBHOOK